# Warp-like 기본 설정
set -g status-position top
set -g status-style 'bg=#1a1b26 fg=#c0caf5'
set -g status-left-length 40
set -g status-right-length 80
set -g status-justify centre
set -g window-status-current-style 'bg=#7aa2f7 fg=#1a1b26 bold'
set -g pane-border-style 'fg=#414868'
set -g pane-active-border-style 'fg=#7aa2f7'

# 왼쪽: 세션 + 호스트 (Warp 상단 탭 느낌)
set -g status-left '#[fg=#7aa2f7,bold] #S #[fg=#9d7cd8] #H '

# 중앙: 윈도우 리스트 (Warp block 스타일)
set -g window-status-format ' #I:#W '
set -g window-status-current-format '#[fg=#1a1b26,bg=#7aa2f7,nobold] #I:#W '

# 오른쪽: Git + 시간 + 디렉토리 (Warp 프롬프트 핵심)
set -g status-right '#[fg=#73daca,bg=#1a1b26] #(basename "#{pane_current_path}") '
set -g status-right '#[fg=#9d7cd8,bg=#1a1b26] #(git -C "#{pane_current_path}" rev-parse --abbrev-ref HEAD 2>/dev/null || echo "") '
set -g status-right '#[fg=#c0caf5,bg=#1a1b26] %H:%M %Y-%m-%d '

